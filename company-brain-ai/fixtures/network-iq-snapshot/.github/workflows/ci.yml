name: CI
on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    name: Maven build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        run: ./mvnw -q test
