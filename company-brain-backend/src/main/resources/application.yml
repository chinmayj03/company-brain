spring:
  application:
    name: company-brain-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:companybrain}
    username: ${DB_USER:companybrain}
    password: ${DB_PASSWORD:companybrain}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jackson:
    property-naming-strategy: SNAKE_CASE   # all Java DTOs serialize/deserialize as snake_case

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 100        # PipelineService uses saveAll() — batch 100 rows per round-trip
          fetch_size: 200        # ResultSet streaming for large reads
        order_inserts: true      # Group INSERTs by entity type so batching fires correctly
        order_updates: true      # Same for UPDATEs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 18

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes default TTL

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-minimum-256-bits}
    expiration-ms: 86400000  # 24 hours

  # AI service (Python, port 8000) — called by PipelineService to start LLM extraction
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

  # ResynthesisService uses these to call Python and receive callbacks
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  backend-url: ${BACKEND_URL:http://localhost:8080}

  # Shared secret for internal service-to-service calls (AI service → Java backend)
  # Set a strong random value in production via AI_INTERNAL_KEY env var
  internal-api-key: ${AI_INTERNAL_KEY:dev-internal-key}

  # CORS — allowed origins for the REST API
  # In production set: CORS_ALLOWED_ORIGINS=https://app.companybrain.io
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  # Per-workspace RLS: set via Postgres SET LOCAL at session start
  rls:
    setting-key: app.workspace_id

  blast-radius:
    max-depth: 5
    min-confidence: 0.5
    stale-edge-days: 30

# AWS (used for SQS ingestion queue)
spring.cloud.aws:
  region:
    static: ${AWS_REGION:us-east-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  sqs:
    endpoint: ${SQS_ENDPOINT:}   # Override for LocalStack in dev

queues:
  ingestion: ${SQS_INGESTION_QUEUE:company-brain-ingestion}
  ingestion-dlq: ${SQS_INGESTION_DLQ:company-brain-ingestion-dlq}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.companybrain: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

---
# Dev profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  logging:
    level:
      com.companybrain: DEBUG
