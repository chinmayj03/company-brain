name: VS Code Extension

# Trigger model:
#
# This account currently fails to allocate GitHub-hosted runners — every job
# (including a one-line `echo hello` probe) ends with runner_id=0 and zero
# steps executed within ~2s. That is an account/billing-level issue, not a
# workflow defect (yaml.safe_load and actionlint both pass; the build itself
# is verified locally and via the Python acceptance test on every PR).
#
# Until runner allocation is fixed for this account, we keep the workflow
# manual-only so it doesn't paint every commit with a red X. Re-enable the
# `pull_request` / `push` triggers below once a `workflow_dispatch` run
# completes successfully.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - 'ide/vscode-extension/**'
  #     - '.github/workflows/vscode-extension.yml'
  # push:
  #   branches: [main]
  #   paths:
  #     - 'ide/vscode-extension/**'
  #     - '.github/workflows/vscode-extension.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ide/vscode-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Caching is intentionally off — fresh repos sometimes hit a
          # cache-restore failure on the very first run, and the install
          # itself is fast enough (~14s locally) that the cache barely pays
          # for itself for a single TypeScript package.

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx --yes @vscode/vsce package --no-yarn --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: company-brain-vsix
          path: ide/vscode-extension/*.vsix
          if-no-files-found: error
