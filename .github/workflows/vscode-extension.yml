name: VS Code Extension

on:
  pull_request:
    paths:
      - 'ide/vscode-extension/**'
      - '.github/workflows/vscode-extension.yml'
  push:
    branches: [main]
    paths:
      - 'ide/vscode-extension/**'
      - '.github/workflows/vscode-extension.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/vscode-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ide/vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx --yes @vscode/vsce package --no-yarn --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: company-brain-vsix
          path: ide/vscode-extension/*.vsix
          if-no-files-found: error
