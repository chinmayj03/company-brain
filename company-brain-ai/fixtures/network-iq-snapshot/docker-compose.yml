version: "3.9"
services:
  app:
    image: network-iq:latest
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/network_iq
      SPRING_DATASOURCE_USERNAME: network_iq_app
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=network_iq_app
      - POSTGRES_DB=network_iq
      - POSTGRES_PASSWORD=changeme
    ports:
      - "5432:5432"
