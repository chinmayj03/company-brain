openapi: 3.0.3
info:
  title: Network IQ Payers API
  version: 1.0.0
paths:
  /v1/payers:
    get:
      operationId: listPayers
      summary: List payers
      tags: [payers]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payer'
    post:
      operationId: createPayer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payer'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payer'
  /v1/payers/{id}:
    get:
      operationId: getPayer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payer'
        '404':
          description: not found
  /v1/orphan-endpoint:
    # Intentionally absent from any controller. The drift detector should
    # surface this as a spec-without-impl.
    get:
      operationId: orphanEndpoint
      responses:
        '200':
          description: ok
components:
  schemas:
    Payer:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        lob:
          type: array
          items:
            type: string
